openapi: 3.0.3
info:
  title: Checkpoint 1 Products API
  version: 1.0.0
  description: API REST versionada para consulta de produtos do Checkpoint 1.
servers:
  - url: http://127.0.0.1:8000/api/v1
    description: Ambiente local
tags:
  - name: Products
    description: Consulta de produtos
paths:
  /products:
    get:
      tags:
        - Products
      summary: Lista produtos
      description: Retorna produtos com filtros, ordenação determinística e paginação por página ou por limit/offset.
      parameters:
        - $ref: "#/components/parameters/NameFilter"
        - $ref: "#/components/parameters/SkuFilter"
        - $ref: "#/components/parameters/CategoryFilter"
        - $ref: "#/components/parameters/StatusFilter"
        - $ref: "#/components/parameters/MinPriceFilter"
        - $ref: "#/components/parameters/MaxPriceFilter"
        - $ref: "#/components/parameters/InStockFilter"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Direction"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Lista de produtos retornada com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
              examples:
                success:
                  value:
                    data:
                      - id: 1
                        name: Teclado
                        description: Teclado ABNT2
                        price: 249.9
                        sku: TEC-001
                        stock: 5
                        status: active
                        slug: teclado
                        links:
                          self: http://127.0.0.1:8000/api/v1/products/1
                    meta:
                      current_page: 1
                      per_page: 10
                      total: 1
                      last_page: 1
                      sort: name
                      direction: asc
                      order_tiebreaker: id
                      filters: {}
                      links:
                        first: http://127.0.0.1:8000/api/v1/products?page=1
                        last: http://127.0.0.1:8000/api/v1/products?page=1
                        prev: null
                        next: null
                    errors: []
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /products/{product}:
    get:
      tags:
        - Products
      summary: Detalha produto por ID ou slug
      description: O parametro aceita um ID numerico ou o slug gerado a partir do nome.
      parameters:
        - name: product
          in: path
          required: true
          description: ID numerico ou slug do produto.
          schema:
            type: string
          examples:
            id:
              value: "1"
            slug:
              value: monitor-24-polegadas
      responses:
        "200":
          description: Produto encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetailResponse"
              examples:
                success:
                  value:
                    data:
                      id: 1
                      name: Monitor 24 Polegadas
                      description: Monitor LED Full HD
                      price: 899
                      sku: MON-001
                      stock: 2
                      status: active
                      slug: monitor-24-polegadas
                      links:
                        self: http://127.0.0.1:8000/api/v1/products/1
                    meta: {}
                    errors: []
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  parameters:
    NameFilter:
      name: name
      in: query
      required: false
      description: Filtra produtos por trecho do nome.
      schema:
        type: string
    SkuFilter:
      name: sku
      in: query
      required: false
      description: Filtra por SKU exato. O backend normaliza para maiusculas.
      schema:
        type: string
    CategoryFilter:
      name: category
      in: query
      required: false
      description: Filtra por categoria quando a coluna existir no banco.
      schema:
        type: string
    StatusFilter:
      name: status
      in: query
      required: false
      description: Filtra por status.
      schema:
        type: string
        enum:
          - active
          - inactive
    MinPriceFilter:
      name: min_price
      in: query
      required: false
      description: Preco minimo.
      schema:
        type: number
        format: float
        minimum: 0
    MaxPriceFilter:
      name: max_price
      in: query
      required: false
      description: Preco maximo.
      schema:
        type: number
        format: float
        minimum: 0
    InStockFilter:
      name: in_stock
      in: query
      required: false
      description: Quando verdadeiro, retorna apenas produtos com estoque maior que zero.
      schema:
        type: boolean
    Sort:
      name: sort
      in: query
      required: false
      description: Campo permitido para ordenacao. A API sempre desempata por id asc.
      schema:
        type: string
        enum:
          - name
          - price
          - stock
          - created_at
        default: name
    Direction:
      name: direction
      in: query
      required: false
      description: Direcao da ordenacao.
      schema:
        type: string
        enum:
          - asc
          - desc
        default: asc
    Page:
      name: page
      in: query
      required: false
      description: Pagina usada no modo page/per_page.
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      required: false
      description: Tamanho da pagina. Valores acima de 50 sao limitados a 50.
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 10
    Limit:
      name: limit
      in: query
      required: false
      description: Quantidade de itens no modo limit/offset. Valores acima de 50 sao limitados a 50.
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 10
    Offset:
      name: offset
      in: query
      required: false
      description: Deslocamento inicial no modo limit/offset.
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    BadRequest:
      description: Parametro invalido.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            data: null
            meta:
              status: 400
            errors:
              - message: O parametro limit deve ser numerico.
    NotFound:
      description: Recurso nao encontrado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            data: null
            meta:
              status: 404
            errors:
              - message: Produto nao encontrado.
    InternalServerError:
      description: Erro interno inesperado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            data: null
            meta:
              status: 500
            errors:
              - message: Erro interno do servidor.
  schemas:
    Product:
      type: object
      required:
        - id
        - name
        - price
        - sku
        - stock
        - status
        - slug
        - links
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Teclado
        description:
          type: string
          nullable: true
          example: Teclado ABNT2
        price:
          type: number
          format: float
          example: 249.9
        sku:
          type: string
          example: TEC-001
        stock:
          type: integer
          example: 5
        status:
          type: string
          enum:
            - active
            - inactive
          example: active
        slug:
          type: string
          example: teclado
        links:
          type: object
          properties:
            self:
              type: string
              format: uri
              example: http://127.0.0.1:8000/api/v1/products/1
    ProductListResponse:
      type: object
      required:
        - data
        - meta
        - errors
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        meta:
          type: object
          properties:
            current_page:
              type: integer
            per_page:
              type: integer
            limit:
              type: integer
            offset:
              type: integer
            total:
              type: integer
            last_page:
              type: integer
            sort:
              type: string
            direction:
              type: string
            order_tiebreaker:
              type: string
            filters:
              type: object
            links:
              type: object
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorItem"
    ProductDetailResponse:
      type: object
      required:
        - data
        - meta
        - errors
      properties:
        data:
          $ref: "#/components/schemas/Product"
        meta:
          type: object
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorItem"
    ErrorResponse:
      type: object
      required:
        - data
        - meta
        - errors
      properties:
        data:
          nullable: true
        meta:
          type: object
          properties:
            status:
              type: integer
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorItem"
    ErrorItem:
      type: object
      properties:
        field:
          type: string
          example: limit
        message:
          type: string
          example: O parametro limit deve ser numerico.
